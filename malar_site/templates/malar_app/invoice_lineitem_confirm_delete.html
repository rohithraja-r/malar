{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4>Delete Line Item</h4>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete this line item?</p>
                    <p class="text-muted">Product: <strong>{{ object.product.name }}</strong><br>Quantity: {{ object.quantity }}<br>Total: ₹{{ object.line_total }}</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Yes, Delete</button>
                            <a href="{% url 'malar_app:invoice-detail' object.invoice.pk %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
